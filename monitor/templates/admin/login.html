{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrastyle %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background orbs */
  body::before {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
    top: -100px;
    left: -100px;
    animation: orb1 8s ease-in-out infinite;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
    bottom: -100px;
    right: -100px;
    animation: orb2 10s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes orb1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(60px, 40px) scale(1.1); }
  }

  @keyframes orb2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-40px, -60px) scale(1.15); }
  }

  #container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  .login-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 40px;
    backdrop-filter: blur(20px);
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 22px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(99,102,241,0); }
  }

  .brand h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .brand p {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    margin-top: 6px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    color: #fff;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s ease;
    outline: none;
  }

  .form-group input:focus {
    border-color: rgba(99,102,241,0.6);
    background: rgba(99,102,241,0.08);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }

  .form-group input::placeholder {
    color: rgba(255,255,255,0.2);
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
  .submit-btn:hover::after { opacity: 1; }
  .submit-btn:active { transform: translateY(0); }

  .errornote {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    color: #fca5a5;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
  }

  /* Hide default Django admin header on login page */
  #header { display: none; }
  #content { padding: 0; }
  .login #content { padding: 0; }
</style>
{% endblock %}

{% block content %}
<div id="container">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <h1>Content Monitor</h1>
      <p>Admin Dashboard</p>
    </div>

    {% if form.errors %}
    <div class="errornote">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" id="id_username" name="username" placeholder="Enter username" autofocus>
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" id="id_password" name="password" placeholder="Enter password">
      </div>

      <button type="submit" class="submit-btn">Sign in →</button>
    </form>
  </div>
</div>
{% endblock %}
